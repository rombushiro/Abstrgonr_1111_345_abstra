<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Undertale Mobile: Professional Sprites</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; text-align: center; }
        canvas { display: block; margin: 10px auto; border: 3px solid #fff; background: #000; width: 95vw; height: 95vw; max-width: 360px; image-rendering: pixelated; }
        #controls { position: relative; width: 220px; height: 140px; margin: 10px auto; }
        .btn { position: absolute; width: 65px; height: 65px; background: rgba(255,255,255,0.1); border: 2px solid #fff; color: #fff; font-size: 26px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        #up { left: 77px; top: 0; } #left { left: 0; top: 65px; } #down { left: 77px; top: 65px; } #right { left: 154px; top: 65px; }
        #act { display: block; width: 220px; height: 45px; margin: 10px auto; background: #ffaa00; color: #000; font-weight: bold; border: none; border-radius: 8px; font-size: 16px; }
        #dialog { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 85%; min-height: 60px; border: 3px solid #fff; padding: 15px; background: #000; display: none; z-index: 100; box-sizing: border-box; text-align: left; font-size: 14px; }
    </style>
</head>
<body>
<div id="dialog"></div>
<canvas id="game"></canvas>
<div id="controls">
    <div class="btn" id="up">↑</div><div class="btn" id="left">←</div>
    <div class="btn" id="down">↓</div><div class="btn" id="right">→</div>
</div>
<button id="act">ВЗАИМОДЕЙСТВИЕ</button>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = 360; canvas.height = 360;

// ССЫЛКИ НА ОРИГИНАЛЬНЫЕ СПРАЙТЫ
const sprites = {
    frisk: "https://raw.githubusercontent.com",
    heart: "https://raw.githubusercontent.com",
    toriel: "https://raw.githubusercontent.com",
    sans: "https://raw.githubusercontent.com"
};

const images = {};
Object.keys(sprites).forEach(key => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.src = sprites[key];
    images[key] = img;
});

let currentRoom = "ruins";
let isTalking = false;
let player = { x: 165, y: 280, speed: 5 };

const world = {
    ruins: { bg: "#2d1b2d", npc: { x: 155, y: 80, name: "Ториэль", text: "Дитя, ты выглядишь... иначе. Твои спрайты наконец-то нормальные!", img: "toriel" } },
    forest: { bg: "#000a1a", npc: { x: 70, y: 140, name: "Санс", text: "хе-хе. крутые текстуры. костьми лягу, но они мне нравятся.", img: "sans" } }
};

function draw() {
    const room = world[currentRoom];
    ctx.fillStyle = room.bg;
    ctx.fillRect(0, 0, 360, 360);

    // Пол (плитка)
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    for(let i=0; i<10; i++) ctx.fillRect(0, 150 + i*30, 360, 2);

    // Рисуем NPC
    const npcImg = images[room.npc.img];
    if (npcImg.complete) ctx.drawImage(npcImg, room.npc.x, room.npc.y, 45, 60);

    // Рисуем Игрока (Фриск)
    if (images.frisk.complete) {
        ctx.drawImage(images.frisk, player.x, player.y, 35, 45);
    }

    // Переходы (проверено 2 раза)
    if (player.y < 0 && currentRoom === "ruins") { currentRoom = "forest"; player.y = 310; }
    else if (player.y > 330 && currentRoom === "forest") { currentRoom = "ruins"; player.y = 20; }
}

function move(dir) {
    if (isTalking) return;
    let s = player.speed;
    if (dir === 'up') player.y -= s; if (dir === 'down') player.y += s;
    if (dir === 'left') player.x -= s; if (dir === 'right') player.x += s;
    player.x = Math.max(0, Math.min(325, player.x));
}

function interact() {
    const room = world[currentRoom];
    const dist = Math.hypot(player.x - room.npc.x, player.y - room.npc.y);
    if (dist < 60) {
        isTalking = !isTalking;
        document.getElementById('dialog').style.display = isTalking ? "block" : "none";
        document.getElementById('dialog').innerText = isTalking ? room.npc.name + ": " + room.npc.text : "";
    }
}

const bind = (id) => {
    const el = document.getElementById(id);
    let t;
    el.addEventListener('touchstart', (e) => { e.preventDefault(); t = setInterval(() => move(id), 25); el.style.background = "#fff"; });
    el.addEventListener('touchend', () => { clearInterval(t); el.style.background = "rgba(255,255,255,0.1)"; });
};
['up', 'down', 'left', 'right'].forEach(bind);
document.getElementById('act').onclick = interact;

setInterval(draw, 30);
</script>
</body>
</html>
