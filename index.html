<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Undertale Mobile: True Pixel Edition</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; text-align: center; }
        canvas { display: block; margin: 10px auto; border: 3px solid #fff; background: #000; width: 90vw; height: 90vw; max-width: 360px; image-rendering: pixelated; }
        #controls { position: relative; width: 220px; height: 150px; margin: 5px auto; }
        .btn { position: absolute; width: 65px; height: 65px; background: rgba(255,255,255,0.1); border: 2px solid #fff; color: #fff; font-size: 26px; border-radius: 12px; display: flex; align-items: center; justify-content: center; user-select: none; }
        #up { left: 77px; top: 0; } #left { left: 0; top: 70px; } #down { left: 77px; top: 70px; } #right { left: 154px; top: 70px; }
        #act { display: block; width: 220px; height: 50px; margin: 10px auto; background: #ffaa00; color: #000; font-weight: bold; border: none; border-radius: 8px; font-size: 18px; }
        #dialog { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 85%; min-height: 60px; border: 3px solid #fff; padding: 15px; background: #000; display: none; z-index: 100; box-sizing: border-box; text-align: left; }
    </style>
</head>
<body>
<div id="dialog"></div>
<canvas id="game"></canvas>
<div id="controls">
    <div class="btn" id="up">↑</div><div class="btn" id="left">←</div>
    <div class="btn" id="down">↓</div><div class="btn" id="right">→</div>
</div>
<button id="act">ВЗАИМОДЕЙСТВИЕ</button>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = 360; canvas.height = 360;

let currentRoom = "start";
let gameState = "map"; 
let isTalking = false;
let player = { x: 170, y: 280, speed: 6 };
let bullets = [];
let frame = 0;

// --- ОТРИСОВКА ПИКСЕЛЬ-АРТА (БЕЗ ВНЕШНИХ ФАЙЛОВ) ---

function drawPixelSprite(x, y, scale, pixels, colors) {
    pixels.forEach((row, rIdx) => {
        row.split('').forEach((pixel, pIdx) => {
            if (pixel !== ' ') {
                ctx.fillStyle = colors[pixel];
                ctx.fillRect(x + pIdx * scale, y + rIdx * scale, scale, scale);
            }
        });
    });
}

const sprites = {
    heart: (x, y) => drawPixelSprite(x, y, 2, [
        "  XX XX  ",
        " XXXXXXX ",
        " XXXXXXX ",
        "  XXXXX  ",
        "   XXX   ",
        "    X    "
    ], { 'X': '#f00' }),
    
    toriel: (x, y) => drawPixelSprite(x, y, 4, [
        "  WWWWW  ",
        " WBBWBBW ",
        " WWWWWWW ",
        "  WWWWW  ",
        " PPPPPPP ",
        " PPPWPPP ",
        " PPPPPPP ",
        " P P P P "
    ], { 'W': '#fff', 'B': '#000', 'P': '#9370DB' }),

    sans: (x, y) => drawPixelSprite(x, y, 4, [
        "  WWWWW  ",
        " W B W B ",
        " WWWWWWW ",
        "  WWWWW  ",
        " BBBBBBB ",
        " BWBWBWB ",
        " BBBBBBB ",
        " S S S S "
    ], { 'W': '#fff', 'B': '#00f', 'S': '#fff' })
};

const world = {
    start: { bg: "#201", npc: { x: 150, y: 80, name: "Ториэль", text: "Дитя, эти спрайты нарисованы кодом. Теперь они никогда не исчезнут!", draw: sprites.toriel } },
    forest: { bg: "#001", npc: { x: 150, y: 120, name: "Санс", text: "хе-хе... теперь мы выглядим как в старые добрые времена.", draw: sprites.sans } }
};

function mainLoop() {
    const room = world[currentRoom];
    ctx.fillStyle = room.bg;
    ctx.fillRect(0, 0, 360, 360);

    if (gameState === "map") {
        room.npc.draw(room.npc.x, room.npc.y);
        ctx.fillStyle = "#fff"; ctx.fillText(room.npc.name, room.npc.x, room.npc.y - 10);
        sprites.heart(player.x, player.y);
        
        // Переходы
        if (player.y < -10 && currentRoom === "start") { currentRoom = "forest"; player.y = 330; }
        if (player.y > 350 && currentRoom === "forest") { currentRoom = "start"; player.y = 10; }
    } else {
        // БИТВА
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 4;
        ctx.strokeRect(100, 100, 160, 160);
        sprites.heart(player.x, player.y);

        if (frame % 25 === 0) bullets.push({ x: 110 + Math.random() * 140, y: 100, speed: 5 });
        ctx.fillStyle = "#fff";
        bullets.forEach(b => {
            b.y += b.speed;
            ctx.fillRect(b.x, b.y, 8, 15);
            if (Math.hypot(player.x - b.x, player.y - b.y) < 18) {
                gameState = "map"; player = { x: 170, y: 280 }; bullets = []; alert("ТЫ ПРОИГРАЛ!");
            }
        });
        bullets = bullets.filter(b => b.y < 260);
        frame++;
    }
}

function move(dir) {
    if (isTalking) return;
    let s = (gameState === "battle") ? 4 : 6;
    if (dir === 'up') player.y -= s; if (dir === 'down') player.y += s;
    if (dir === 'left') player.x -= s; if (dir === 'right') player.x += s;
    if (gameState === "battle") {
        player.x = Math.max(105, Math.min(235, player.x));
        player.y = Math.max(105, Math.min(235, player.y));
    } else {
        player.x = Math.max(0, Math.min(340, player.x));
    }
}

function talk() {
    const npc = world[currentRoom].npc;
    if (Math.hypot(player.x - npc.x, player.y - npc.y) < 60) {
        if (!isTalking) {
            isTalking = true;
            document.getElementById('dialog').style.display = "block";
            document.getElementById('dialog').innerText = npc.name + ": " + npc.text;
        } else {
            isTalking = false;
            document.getElementById('dialog').style.display = "none";
            // После диалога Ториэль можно начать битву (для теста)
            if (currentRoom === "start") {
                gameState = "battle"; player = { x: 170, y: 170 };
            }
        }
    }
}

const bind = (id) => {
    const el = document.getElementById(id);
    let t;
    const start = (e) => { e.preventDefault(); t = setInterval(() => move(id), 25); el.style.background = "#fff"; };
    const stop = () => { clearInterval(t); el.style.background = "rgba(255,255,255,0.1)"; };
    el.addEventListener('touchstart', start); el.addEventListener('touchend', stop);
    el.addEventListener('mousedown', start); el.addEventListener('mouseup', stop);
};
['up', 'down', 'left', 'right'].forEach(bind);
document.getElementById('act').onclick = talk;

setInterval(mainLoop, 30);
</script>
</body>
</html>
