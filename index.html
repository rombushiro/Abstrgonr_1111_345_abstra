<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Undertale Mobile Fix</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; text-align: center; }
        canvas { display: block; margin: 10px auto; border: 3px solid #fff; background: #000; width: 90vw; height: 90vw; max-width: 360px; image-rendering: pixelated; }
        #controls { position: relative; width: 220px; height: 140px; margin: 5px auto; }
        .btn { position: absolute; width: 65px; height: 65px; background: rgba(255,255,255,0.2); border: 2px solid #fff; color: #fff; font-size: 26px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        #up { left: 77px; top: 0; } #left { left: 0; top: 70px; } #down { left: 77px; top: 70px; } #right { left: 154px; top: 70px; }
        #act { display: block; width: 220px; height: 50px; margin: 10px auto; background: #f80; color: #000; font-weight: bold; border: none; border-radius: 8px; }
    </style>
</head>
<body>
<canvas id="game"></canvas>
<div id="controls">
    <div class="btn" id="up">↑</div><div class="btn" id="left">←</div>
    <div class="btn" id="down">↓</div><div class="btn" id="right">→</div>
</div>
<button id="act">ДЕЙСТВИЕ</button>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = 360; canvas.height = 360;

let player = { x: 170, y: 280, speed: 7 };

// ФУНКЦИЯ РИСОВАНИЯ (Проверена 2 раза, работает без сервера и интернета)
function drawPixelArt() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, 360, 360);

    // 1. Рисуем ТОРИЭЛЬ (Пиксель за пикселем)
    ctx.fillStyle = "#fff"; // Голова
    ctx.fillRect(165, 80, 30, 25);
    ctx.fillStyle = "#000"; // Глаза
    ctx.fillRect(170, 90, 5, 5); ctx.fillRect(185, 90, 5, 5);
    ctx.fillStyle = "#9370DB"; // Платье
    ctx.fillRect(155, 105, 50, 60);
    ctx.fillStyle = "#fff"; // Эмблема на платье
    ctx.fillRect(175, 125, 10, 10);
    ctx.fillStyle = "#fff"; // Уши/Рожки
    ctx.fillRect(160, 75, 5, 15); ctx.fillRect(195, 75, 5, 15);

    // 2. Рисуем ИГРОКА (Красное сердце)
    ctx.fillStyle = "#f00";
    ctx.fillRect(player.x + 5, player.y, 15, 20);
    ctx.fillRect(player.x, player.y + 5, 25, 10);
    ctx.fillRect(player.x + 10, player.y + 20, 5, 5);
}

function move(dir) {
    let s = player.speed;
    if (dir === 'up') player.y -= s;
    if (dir === 'down') player.y += s;
    if (dir === 'left') player.x -= s;
    if (dir === 'right') player.x += s;
    player.x = Math.max(10, Math.min(320, player.x));
    player.y = Math.max(10, Math.min(320, player.y));
}

// Привязка кнопок (Сенсорное управление)
const bind = (id) => {
    const el = document.getElementById(id);
    let t;
    const start = (e) => { e.preventDefault(); t = setInterval(() => move(id), 25); el.style.background = "#fff"; };
    const stop = () => { clearInterval(t); el.style.background = "rgba(255,255,255,0.2)"; };
    el.addEventListener('touchstart', start); el.addEventListener('touchend', stop);
    el.addEventListener('mousedown', start); el.addEventListener('mouseup', stop);
};
['up', 'down', 'left', 'right'].forEach(bind);

// Основной цикл
setInterval(drawPixelArt, 30);
</script>
</body>
</html>
